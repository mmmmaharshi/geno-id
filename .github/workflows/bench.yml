name: bench

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bun-matrix:
    name: bun ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - run: bun run bench-ci
      - name: Write job summary
        if: always()
        run: |
          bun -e '
          const fs = require("fs");
          const r = JSON.parse(fs.readFileSync("dist/bench-ci-results.json","utf8"));
          const e = r.environment;
          let md = "## GenoID CI benchmark\n\n";
          md += `**Environment:** ${e.runtime} ${e.bun ?? e.node} | ${e.platform}/${e.arch} | ${e.cpuModel} (${e.cpuCount} cpus) | ${e.totalMemoryMB} MB\n\n`;
          md += "| Algorithm | ops/sec | us/op |\n|---|---:|---:|\n";
          for (const b of r.benchmarks) md += `| ${b.name} | ${b.opsPerSec} | ${b.usPerOp} |\n`;
          md += "\n| Algorithm | n | collisions | PASS |\n|---|---:|---:|---|\n";
          for (const c of r.collisions) md += `| ${c.name} | ${c.n} | ${c.collisions} | ${c.collisions === 0 ? "PASS" : "FAIL"} |\n`;
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          '
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-bun-${{ matrix.os }}
          path: dist/bench-ci-results.json

  node-matrix:
    name: node ${{ matrix.node-version }} on ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 23]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install
      - run: bun run build
      - run: bun x tsx scripts/bench-ci.ts
      - name: Write job summary
        if: always()
        run: |
          bun -e '
          const fs = require("fs");
          const r = JSON.parse(fs.readFileSync("dist/bench-ci-results.json","utf8"));
          const e = r.environment;
          let md = "## GenoID CI benchmark\n\n";
          md += `**Environment:** ${e.runtime} ${e.bun ?? e.node} | ${e.platform}/${e.arch} | ${e.cpuModel} (${e.cpuCount} cpus) | ${e.totalMemoryMB} MB\n\n`;
          md += "| Algorithm | ops/sec | us/op |\n|---|---:|---:|\n";
          for (const b of r.benchmarks) md += `| ${b.name} | ${b.opsPerSec} | ${b.usPerOp} |\n`;
          md += "\n| Algorithm | n | collisions | PASS |\n|---|---:|---:|---|\n";
          for (const c of r.collisions) md += `| ${c.name} | ${c.n} | ${c.collisions} | ${c.collisions === 0 ? "PASS" : "FAIL"} |\n`;
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          '
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-node-${{ matrix.node-version }}-ubuntu
          path: dist/bench-ci-results.json
