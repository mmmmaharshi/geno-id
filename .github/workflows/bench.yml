name: bench

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bun-matrix:
    name: bun ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - run: bun run bench-ci
      - name: Write job summary
        if: always()
        run: bun run scripts/ci-summary.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-bun-${{ matrix.os }}
          path: |
            dist/bench-ci-results.json
            dist/ci-summary.md

  node-matrix:
    name: node ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["22"]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install
      - run: bun run build
      - run: bun x tsx scripts/bench-ci.ts
      - name: Write job summary
        if: always()
        run: bun x tsx scripts/ci-summary.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-node-${{ matrix.node-version }}-ubuntu
          path: |
            dist/bench-ci-results.json
            dist/ci-summary.md

  deno-matrix:
    name: deno ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.3"
      - name: Type-check Deno benchmark ports
        run: deno check scripts/deno/bench-ci.ts scripts/deno/collision-100m.ts scripts/deno/stats.ts
      - name: CI benchmark (Deno)
        run: deno run --allow-read --allow-write --allow-env --allow-sys scripts/deno/bench-ci.ts
      - name: 100M collision test (Deno, ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: deno run --allow-read --allow-env --allow-sys scripts/deno/collision-100m.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-deno-${{ matrix.os }}
          path: |
            dist/bench-ci-results.json

  consolidate:
    name: consolidate CI results
    runs-on: ubuntu-latest
    needs: [bun-matrix, node-matrix, deno-matrix]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          path: combined
      - run: bun x tsx scripts/ci-consolidate.ts combined
      - name: Write job summary
        if: always()
        run: cat dist/all-summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-consolidated
          path: |
            dist/all-results.json
            dist/all-summary.md

