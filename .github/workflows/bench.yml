name: bench

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bun-matrix:
    name: bun ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - run: bun run bench-ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-bun-${{ matrix.os }}
          path: dist/bench-ci-results.json

  node-matrix:
    name: node ${{ matrix.node-version }} on ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 23]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install
      - run: bun run build
      - run: bun x tsx scripts/bench-ci.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-node-${{ matrix.node-version }}-ubuntu
          path: dist/bench-ci-results.json
