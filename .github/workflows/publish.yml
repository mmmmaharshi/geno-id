name: publish

# Automatic npm publishing via npm Trusted Publishers (OIDC) — no long-lived
# token. Runs when a version tag (vX.Y.Z) is pushed, keeping publishes tied to
# the repo's release cadence (tag -> npm -> GitHub Release).
#
# One-time npm setup: Access -> Publish -> Trusted Publishers, add:
#   Repository:  mmmmaharshi/geno-id
#   Workflow:    publish.yml
#   (npm derives job_workflow_ref = mmmmaharshi/geno-id/.github/workflows/publish.yml@refs/tags/v*)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # required for npm Trusted Publisher OIDC token

jobs:
  publish:
    name: build + test + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install
      - run: bun run build
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test

      - name: Publish to npm (Trusted Publisher / OIDC)
        run: npm publish --provenance --access public

      - name: Extract CHANGELOG section for this version
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"
          awk -v ver="$VER" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          echo "notes-file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "genoid ${{ github.ref_name }}" \
            --latest \
            --notes-file "${{ steps.notes.outputs.notes-file }}"
