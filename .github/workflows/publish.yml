name: publish

# Automatic npm publishing. Runs when a version tag (vX.Y.Z) is pushed,
# keeping publishes tied to the repo's release cadence (tag -> Release -> npm).
# Requires a repo secret NPM_TOKEN (npm automation token, publish rights to
# the @manohar_maharshi scope).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: build + test + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install
      - run: bun run build
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
